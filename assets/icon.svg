<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#103022"/>
      <stop offset="0.6" stop-color="#08160e"/>
      <stop offset="1" stop-color="#020604"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff6a6a"/>
      <stop offset="0.4" stop-color="#d60000"/>
      <stop offset="1" stop-color="#d60000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>

  <!-- çerçeveleyen ağaç gövdeleri -->
  <rect x="70"  y="150" width="70" height="760" fill="#06140d"/>
  <rect x="884" y="150" width="70" height="760" fill="#06140d"/>
  <polygon points="105,120 200,360 10,360" fill="#0a1d12"/>
  <polygon points="919,120 1014,360 824,360" fill="#0a1d12"/>

  <!-- solgun yüz -->
  <ellipse cx="512" cy="470" rx="250" ry="320" fill="#ddd6c8"/>
  <!-- çökük yanak gölgeleri -->
  <ellipse cx="370" cy="470" rx="80" ry="150" fill="#3a2a26" opacity="0.45"/>
  <ellipse cx="654" cy="470" rx="80" ry="150" fill="#3a2a26" opacity="0.45"/>

  <!-- kara göz çukurları -->
  <ellipse cx="420" cy="430" rx="70" ry="92" fill="#080808"/>
  <ellipse cx="604" cy="430" rx="70" ry="92" fill="#080808"/>
  <!-- kırmızı gözler + parıltı -->
  <circle cx="420" cy="438" r="86" fill="url(#glow)"/>
  <circle cx="604" cy="438" r="86" fill="url(#glow)"/>
  <circle cx="420" cy="438" r="26" fill="#ff2a2a"/>
  <circle cx="604" cy="438" r="26" fill="#ff2a2a"/>
  <circle cx="412" cy="430" r="8" fill="#ffd0d0"/>
  <circle cx="596" cy="430" r="8" fill="#ffd0d0"/>

  <!-- gözlerden kan -->
  <path d="M420 520 l-8 250" stroke="#8a0000" stroke-width="13" stroke-linecap="round"/>
  <path d="M604 520 l10 280" stroke="#8a0000" stroke-width="13" stroke-linecap="round"/>

  <!-- açık çığlık ağzı -->
  <ellipse cx="512" cy="690" rx="78" ry="120" fill="#0d0000"/>
  <g fill="#cfc6b6">
    <rect x="452" y="600" width="22" height="40"/>
    <rect x="486" y="600" width="22" height="40"/>
    <rect x="520" y="600" width="22" height="40"/>
    <rect x="554" y="600" width="22" height="40"/>
    <rect x="452" y="752" width="22" height="40"/>
    <rect x="520" y="752" width="22" height="40"/>
  </g>
  <!-- ağızdan kan -->
  <path d="M512 800 q-6 60 0 96 q6 -36 0 -96" fill="#9c0000"/>

  <!-- 100 rozeti -->
  <text x="512" y="958" text-anchor="middle" font-family="'Big Shoulders','DejaVu Sans',sans-serif" font-weight="700" font-size="150" letter-spacing="6" fill="#d11414" stroke="#350303" stroke-width="4">100</text>
</svg>

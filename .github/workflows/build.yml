name: Uygulamaları Derle (masaüstü + Android)

# Elle çalıştır (Actions sekmesi > Run workflow) ya da "v1.0.0" gibi bir etiket it.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # ---- Masaüstü: Windows .exe, macOS .dmg, Linux .AppImage ----
  masaustu:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Kurulum dosyalarını derle (electron-builder)
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # imzasız derleme
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: masaustu-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: ignore

  # ---- Android: kurulabilir .apk ----
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
      - name: Web varlıklarını paketle (Vite)
        run: npm run build:web
      - name: Android projesini oluştur (Capacitor)
        run: npx cap add android
      - name: APK derle
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # ---- Etiket (v*) itilince: indirme linkli GitHub Release oluştur ----
  yayinla:
    name: Release (indirme linkleri)
    needs: [masaustu, android]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: indirilenler
      - name: Release yayınla
        uses: softprops/action-gh-release@v2
        with:
          files: indirilenler/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            🌴🔪 **100 Gün Ormanda** — indir, çift tıkla, oyna (kurulum kendiliğinden).
            - 🪟 Windows: `*.exe`  ·  🍎 macOS: `*.dmg`  ·  🐧 Linux: `*.AppImage`  ·  🤖 Android: `*.apk`
